---
- name: Install asdf
  ansible.builtin.unarchive:
    src: https://github.com/asdf-vm/asdf/releases/download/v{{ tools_asdf_version }}/asdf-v{{ tools_asdf_version }}-linux-amd64.tar.gz
    dest: /usr/local/bin
    mode: "u=rwx,go=rx"
    remote_src: true
  become: true

- name: Add asdf preload
  ansible.builtin.blockinfile:
    path: ~/.zshrc_post
    create: true
    marker: "# {mark} ANSIBLE MANAGED ASDF BLOCK -->"
    block: |
      export ASDF_DATA_DIR="$HOME/.asdf"
      export PATH="${ASDF_DATA_DIR:-$HOME/.asdf}/shims:$PATH"
    mode: 'u=rw,g=r'
