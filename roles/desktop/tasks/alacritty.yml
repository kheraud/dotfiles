---
- name: "Install Alacritty"
  ansible.builtin.apt:
    name: "alacritty"
    state: present
  become: true

- name: "Install xdotool + xsel"
  ansible.builtin.apt:
    name:
      - xdotool
      - xsel
    state: present
  become: true

- name: Add dependencies for launch script
  ansible.builtin.apt:
    name:
      - wmctrl
    state: present
  become: true

- name: "Copy launch alacritty script"
  ansible.builtin.copy:
    src: launch-alacritty-in-ws.sh
    dest: /usr/local/bin/
    mode: 'u=rwx,go=rx'
  become: true

- name: "Ensure alacritty config path exists"
  ansible.builtin.file:
    mode: "ug=rwx,o=rx"
    path: ~/.config/alacritty
    state: directory

- name: "Edit alacritty configuration"
  ansible.builtin.template:
    src: alacritty/alacritty.toml.j2
    dest: ~/.config/alacritty/alacritty.toml
    mode: 'u=rwx,g=rx'
  vars:
    font_name: "{{ desktop_shell_fonts[desktop_shell_font]['name'] }}"
