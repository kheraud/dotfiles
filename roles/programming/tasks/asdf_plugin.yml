---
- name: "Install plugin {{ plugin_name }} prerequisites"
  ansible.builtin.apt:
    name: "{{ plugin_apt_prerequisites }}"
    state: present
  when: plugin_apt_prerequisites | length > 0
  become: true

- name: "Add plugin {{ plugin_name }}"
  ansible.builtin.command: "asdf plugin add {{ plugin_name }}"
  register: added_plugin
  changed_when: '"already added" not in added_plugin.stderr'
  failed_when: added_plugin.rc != 0 and '"already added" not in added_plugin.stderr'

- name: "Get installed versions of {{ plugin_name }}"
  ansible.builtin.command: "asdf list {{ plugin_name }}"
  register: raw_installed_version
  changed_when: false

- name: "Format installed versions of {{ plugin_name }}"
  ansible.builtin.set_fact:
    installed_version: "{{ raw_installed_version.stdout_lines | map('trim') | map('replace', '*', '') | map('trim') | list }}"

- name: "Resolve 'latest' version for {{ plugin_name }}"
  ansible.builtin.command: "asdf latest {{ plugin_name }}"
  register: latest_version
  when: "'latest' in plugin_versions"
  changed_when: false

- name: "Install and configure versions for {{ plugin_name }}"
  vars:
    resolved_plugin_versions: >-
      {{
        plugin_versions |
        map('regex_replace', '^latest$', latest_version.stdout | default('')) |
        list
      }}
  when: plugin_versions | length > 0
  block:
    - name: "Install version {{ plugin_version }} for {{ plugin_name }}"
      ansible.builtin.command: "asdf install {{ plugin_name }} {{ plugin_version }}"
      when: plugin_version not in installed_version
      changed_when: true
      loop: "{{ resolved_plugin_versions }}"
      loop_control:
        loop_var: plugin_version

    - name: "Set default version for {{ plugin_name }}"
      ansible.builtin.blockinfile:
        path: "~/.tool-versions"
        marker: "# {mark} ANSIBLE MANAGED {{ plugin_name }} BLOCK"
        block: |
          {{ plugin_name }} {{ latest_version.stdout | default('') if plugin_versions[0] == 'latest' else plugin_versions[0] }}
        create: true
        mode: "u=rw,g=r,o="

    - name: "Add pre-zsh config for {{ plugin_name }}"
      ansible.builtin.blockinfile:
        path: "~/.zshrc_pre"
        marker: "# {mark} ANSIBLE MANAGED {{ plugin_name }} BLOCK"
        block: "{{ plugin_extra_zsh_pre_conf }}"
        create: true
        mode: "u=rw,g=r,o="
      when: plugin_extra_zsh_pre_conf | length > 0

    - name: "Add post-zsh config for {{ plugin_name }}"
      ansible.builtin.blockinfile:
        path: "~/.zshrc_post"
        marker: "# {mark} ANSIBLE MANAGED {{ plugin_name }} BLOCK"
        block: "{{ plugin_extra_zsh_post_conf }}"
        create: true
        mode: "u=rw,g=r,o="
      when: plugin_extra_zsh_post_conf | length > 0
